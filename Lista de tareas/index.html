<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Stylized To-Do List</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>Mi Lista de Tareas</h1>

  <ul class="todo-list">
    <li>
      <input type="checkbox" id="task1">
      <label for="task1">Revisar correo electrónico</label>
      <ul class="sub-item">
        <li><a class="sub-item-link" href="https://outlook.com" target="_blank">Abrir Outlook</a></li>
      </ul>
    </li>

    <li>
      <input type="checkbox" id="task2">
      <label for="task2">Estudiar CSS</label>
      <ul class="sub-item">
        <li><a class="sub-item-link" href="https://developer.mozilla.org/en-US/docs/Web/CSS" target="_blank">Documentación CSS</a></li>
      </ul>
    </li>

    <li>
      <input type="checkbox" id="task3">
      <label for="task3">Practicar JavaScript</label>
      <ul class="sub-item">
        <li><a class="sub-item-link" href="https://javascript.info" target="_blank">Guía JS</a></li>
      </ul>
    </li>

    <li>
      <input type="checkbox" id="task4">
      <label for="task4">Actualizar repositorio GitHub</label>
      <ul class="sub-item">
        <li><a class="sub-item-link" href="https://github.com" target="_blank">Abrir GitHub</a></li>
      </ul>
    </li>
  </ul>
</body>
</html>
